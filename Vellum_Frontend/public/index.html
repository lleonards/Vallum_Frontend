<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#3d3d3d" />
    <meta name="description" content="Vellum - Editor de documentos profissional. Crie, edite e converta documentos com facilidade." />
    <meta name="keywords" content="editor de documentos, PDF, Word, converter arquivos, Vellum" />
    <meta property="og:title" content="Vellum - Editor de Documentos" />
    <meta property="og:description" content="Crie e edite documentos profissionais com Vellum" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Vellum - Editor de Documentos</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #f5f5f5;
        transition: background 0.3s ease;
      }
      body.dark { background: #1a1a1a; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }

      /* Loading spinner */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a1a;
        flex-direction: column;
        gap: 20px;
      }
      .app-loading-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        animation: fadeIn 0.5s ease;
      }
      .app-loading-logo svg { width: 48px; height: 48px; }
      .app-loading-logo span {
        font-size: 28px;
        font-weight: 700;
        color: white;
        letter-spacing: 4px;
        font-family: 'Space Grotesk', sans-serif;
      }
      .loading-bar {
        width: 200px;
        height: 3px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-bar-inner {
        height: 100%;
        background: #ffffff;
        border-radius: 2px;
        animation: loadingProgress 1.5s ease infinite;
      }
      @keyframes loadingProgress {
        0% { width: 0%; transform: translateX(0); }
        50% { width: 70%; }
        100% { width: 100%; transform: translateX(100%); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar o JavaScript para usar o Vellum.</noscript>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-logo">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- V shape with book icon -->
            <path d="M15 15 L50 75 L85 15" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M32 50 L50 75 L68 50" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
            <path d="M50 75 L50 55" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
          </svg>
          <span>VELLUM</span>
        </div>
        <div class="loading-bar">
          <div class="loading-bar-inner"></div>
        </div>
      </div>
    </div>
  </body>
</html>
